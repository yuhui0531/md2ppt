server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 32m;

    # 后端接口反代
    # `^~` 必须保留：nginx 默认 regex location 优先级高于 prefix；下方的静态资源
    # 正则会按扩展名拦截 .png/.jpg/.svg 等请求，把 /api/images/.../slide-1.png
    # 这种合法 API 请求当成静态文件去 /usr/share/nginx/html 下找，导致 404。
    # `^~` 告诉 nginx：这条 prefix 命中后不再走 regex，从而保护所有 /api/* 路径。
    location ^~ /api/ {
        proxy_pass http://backend:8008;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 不让 nginx 跟随 302，把后端的重定向原样回给浏览器（SSO 登录依赖）
        proxy_redirect off;

        # 长任务/流式响应（生成、生图）需要更长读超时
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # 前端 SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
}
