services:
  backend:
    build:
      context: ./backend
    image: md2ppt-backend:latest
    container_name: md2ppt-backend
    restart: unless-stopped
    environment:
      # ---- SSO ----
      APP_SSO_VERIFY_URL: ${APP_SSO_VERIFY_URL:?APP_SSO_VERIFY_URL is required}
      APP_SSO_CLIENT_ID: ${APP_SSO_CLIENT_ID:?APP_SSO_CLIENT_ID is required}
      APP_SSO_CLIENT_SECRET: ${APP_SSO_CLIENT_SECRET:?APP_SSO_CLIENT_SECRET is required}
      APP_SSO_TRUSTED_ORIGINS: ${APP_SSO_TRUSTED_ORIGINS:-["third-party.example.com"]}
      APP_SSO_TIMEOUT_SECONDS: ${APP_SSO_TIMEOUT_SECONDS:-5}

      # ---- JWT (HttpOnly cookie) ----
      APP_JWT_SECRET: ${APP_JWT_SECRET:?APP_JWT_SECRET is required (openssl rand -hex 32)}
      APP_JWT_TTL_SECONDS: ${APP_JWT_TTL_SECONDS:-3600}
      APP_JWT_COOKIE_SECURE: ${APP_JWT_COOKIE_SECURE:-false}

      # ---- Frontend redirect paths ----
      APP_FRONTEND_HOME_PATH: ${APP_FRONTEND_HOME_PATH:-/projects}
      APP_FRONTEND_FAILED_PATH: ${APP_FRONTEND_FAILED_PATH:-/sso/failed}

      # ---- Logging ----
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}

      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - md2ppt_storage:/app/app/storage
    networks:
      - internal
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8008/api/health', timeout=3).status==200 else 1)" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    image: md2ppt-frontend:latest
    container_name: md2ppt-frontend
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - internal

volumes:
  md2ppt_storage:
    name: md2ppt_storage

networks:
  internal:
    driver: bridge
